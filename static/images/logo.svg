<svg width="480" height="120" viewBox="0 0 480 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <style>
      .text-main { font-family: system-ui, -apple-system, sans-serif; font-weight: 800; font-size: 60px; fill: #1e293b; letter-spacing: -2px; }
      .text-sub { font-family: system-ui, -apple-system, sans-serif; font-weight: 600; font-size: 14px; fill: #64748b; letter-spacing: 4px; text-transform: uppercase; }
      @media (prefers-color-scheme: dark) {
        .text-main { fill: #f8fafc; }
        .text-sub { fill: #94a3b8; }
      }
    </style>
  </defs>

  <!-- AI Eye / Modern Health Vision Mark -->
  <g transform="translate(10, 10)">
    <path d="M50 20C75 20 95 40 95 50C95 60 75 80 50 80C25 80 5 60 5 50C5 40 25 20 50 20Z" fill="none" stroke="url(#iconGrad)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="50" cy="50" r="14" fill="url(#iconGrad)"/>
    <circle cx="50" cy="50" r="42" fill="none" stroke="#6366f1" stroke-width="2" stroke-dasharray="8 8" opacity="0.6"/>
  </g>

  <!-- Brand Typography -->
  <text x="130" y="74" class="text-main"><tspan fill="url(#iconGrad)">Little</tspan><tspan>Vision</tspan></text>
  <text x="134" y="100" class="text-sub">AI Health Assistant</text>
</svg>
