<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 48" fill="none">
  <defs>
    <linearGradient id="eyeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="55%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="irisGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Outer eye almond -->
  <path d="M4 24 C12 10, 30 5, 44 5 C58 5, 76 10, 84 24 C76 38, 58 43, 44 43 C30 43, 12 38, 4 24Z"
        fill="none" stroke="url(#eyeGrad)" stroke-width="2.5" stroke-linejoin="round"
        filter="url(#glow)"/>

  <!-- Subtle sclera fill -->
  <path d="M6 24 C14 11.5, 31 7, 44 7 C57 7, 74 11.5, 82 24 C74 36.5, 57 41, 44 41 C31 41, 14 36.5, 6 24Z"
        fill="url(#eyeGrad)" opacity="0.07"/>

  <!-- Iris ring -->
  <circle cx="44" cy="24" r="11" fill="url(#irisGrad)" opacity="0.15"/>
  <circle cx="44" cy="24" r="11" fill="none" stroke="url(#irisGrad)" stroke-width="2.2" filter="url(#glow)"/>

  <!-- Pupil -->
  <circle cx="44" cy="24" r="5" fill="url(#irisGrad)"/>

  <!-- Specular highlight -->
  <circle cx="47.5" cy="20" r="1.8" fill="white" opacity="0.80"/>

  <!-- Medical cross inside pupil -->
  <line x1="44" y1="21" x2="44" y2="27" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="41" y1="24" x2="47" y2="24" stroke="white" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Top eyelash marks -->
  <line x1="44" y1="5"  x2="44"  y2="2"   stroke="url(#eyeGrad)" stroke-width="1.4" stroke-linecap="round" opacity="0.5"/>
  <line x1="35" y1="7"  x2="33"  y2="4.2" stroke="url(#eyeGrad)" stroke-width="1.2" stroke-linecap="round" opacity="0.38"/>
  <line x1="53" y1="7"  x2="55"  y2="4.2" stroke="url(#eyeGrad)" stroke-width="1.2" stroke-linecap="round" opacity="0.38"/>

  <!-- Wordmark -->
  <text x="96" y="30"
        font-family="Inter, system-ui, -apple-system, sans-serif"
        font-size="17" font-weight="700" letter-spacing="-0.5"
        fill="url(#eyeGrad)">LittleVision</text>
</svg>