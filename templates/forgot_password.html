<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Forgot Password — LittleVision</title>
    <meta name="description" content="Reset your LittleVision password">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] } } } }</script>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body class="auth-page min-h-screen flex items-center justify-center p-4">

    <div class="glass-card w-full max-w-sm p-8 page-enter">
        <div class="flex justify-center mb-6">
            <img src="/static/images/logo.svg" alt="LittleVision" class="h-14 w-auto">
        </div>

        <div class="flex justify-center mb-4">
            <div class="w-14 h-14 rounded-full flex items-center justify-center" style="background: var(--accent-subtle);">
                <svg class="w-7 h-7" style="color: var(--accent);" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                </svg>
            </div>
        </div>

        <h1 class="text-2xl font-bold text-center mb-1" style="color: var(--text-primary);">Forgot password?</h1>
        <p class="text-center text-sm mb-7" style="color: var(--text-tertiary);">Enter your email and we'll send you a reset code</p>

        <form id="forgotForm" class="space-y-4">
            <div>
                <label for="email" class="block text-sm font-medium mb-1.5" style="color: var(--text-secondary);">Email address</label>
                <input type="email" id="email" name="email" required autocomplete="email" class="lv-input" placeholder="you@example.com">
            </div>
            <button type="submit" class="lv-btn lv-btn-primary w-full">
                <span class="spinner"></span>
                <span class="btn-text">Send reset code</span>
            </button>
        </form>

        <p class="text-center text-sm mt-6" style="color: var(--text-tertiary);">
            <a href="/login" class="font-semibold" style="color: var(--accent);">← Back to login</a>
        </p>
    </div>

    <script src="/static/js/auth.js"></script>
</body>
</html>
