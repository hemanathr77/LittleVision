<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Reset Password — LittleVision</title>
    <meta name="description" content="Set a new password for your LittleVision account">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] } } } }</script>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body class="auth-page min-h-screen flex items-center justify-center p-4">

    <div class="glass-card w-full max-w-sm p-8 page-enter">
        <div class="flex justify-center mb-6">
            <img src="/static/images/logo.svg" alt="LittleVision" class="h-14 w-auto">
        </div>

        <div class="flex justify-center mb-4">
            <div class="w-14 h-14 rounded-full flex items-center justify-center" style="background: var(--accent-subtle);">
                <svg class="w-7 h-7" style="color: var(--accent);" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
                </svg>
            </div>
        </div>

        <h1 class="text-2xl font-bold text-center mb-1" style="color: var(--text-primary);">Set new password</h1>
        <p class="text-center text-sm mb-7" style="color: var(--text-tertiary);">Choose a strong password for your account</p>

        <form id="resetForm" class="space-y-4">
            <div>
                <label for="password" class="block text-sm font-medium mb-1.5" style="color: var(--text-secondary);">New Password</label>
                <div class="relative">
                    <input type="password" id="password" name="password" required autocomplete="new-password"
                           class="lv-input pr-11" placeholder="Enter new password">
                    <button type="button" id="togglePassword"
                            class="absolute right-3 top-1/2 -translate-y-1/2 transition-colors" style="color: var(--text-tertiary);">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                        </svg>
                    </button>
                </div>
                <div id="passwordMeter" class="strength-bar"><div class="strength-bar-fill"></div></div>
                <div id="passwordChecks" class="flex flex-wrap gap-x-3 gap-y-1 mt-1.5"></div>
            </div>
            <div>
                <label for="confirm_password" class="block text-sm font-medium mb-1.5" style="color: var(--text-secondary);">Confirm Password</label>
                <div class="relative">
                    <input type="password" id="confirm_password" name="confirm_password" required autocomplete="new-password"
                           class="lv-input pr-11" placeholder="Confirm new password">
                    <button type="button" id="toggleConfirmPassword"
                            class="absolute right-3 top-1/2 -translate-y-1/2 transition-colors" style="color: var(--text-tertiary);">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                        </svg>
                    </button>
                </div>
            </div>

            <button type="submit" class="lv-btn lv-btn-primary w-full">
                <span class="spinner"></span>
                <span class="btn-text">Reset Password</span>
            </button>
        </form>
    </div>

    <script src="/static/js/auth.js"></script>
    <script src="/static/js/pullToRefresh.js"></script>
</body>
</html>
